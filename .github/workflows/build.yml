name: Build VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile tests
        run: npm run compile:test

      - name: Test
        run: node --test out/test/*.test.js

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce package
